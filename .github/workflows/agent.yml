name: Agent Chariow (contenu du jour)

# Quand l'agent tourne :
#  - toutes les 6 heures (synchro des ventes Chariow + contenu pub)
#  - ou manuellement depuis l'onglet "Actions" de GitHub (bouton "Run workflow")
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

# Autorise le workflow à recommiter data/queue.json et data/activity.json
permissions:
  contents: write

jobs:
  agent:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Synchroniser les données Chariow (produits + ventes)
        env:
          # Clé secrète Chariow (Settings > Secrets and variables > Actions)
          CHARIOW_API_KEY: ${{ secrets.CHARIOW_API_KEY }}
        run: node agent/sync-chariow.js

      - name: Lancer l'agent (contenu pub du jour)
        env:
          # La clé vient des Secrets GitHub (Settings > Secrets and variables > Actions)
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node agent/run.js

      - name: Sauvegarder les données et le contenu généré
        run: |
          git config user.name "agent-chariow[bot]"
          git config user.email "actions@github.com"
          git add data/products.json data/sales.json data/queue.json data/activity.json
          if git diff --staged --quiet; then
            echo "Aucun changement à commiter."
          else
            git commit -m "🤖 Synchro Chariow + contenu ($(date +%F\ %H:%M))"
            git push
          fi
